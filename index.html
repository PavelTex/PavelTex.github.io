<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shop</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: "Monaco",sans-serif;
            font-weight: 200;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
        }
        #menu{
            width: 100%;
            padding: 20px;
            text-align: center;
            display: block;
        }
        h1{
            margin-top: 50px;
            margin-bottom: 10px;
        }
        p{
            width: 350px;
            margin: 0 auto;
        }
        img {
            width: 150px;
        }
        button {
            border: 0;
            border-radius: 5px;
            margin-top: 50px;
            height: 60px;
            width: 200px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 500ms ease;
            color: var(--tg theme-button-color);
            background: ver(--th-theme-button-text-color);

        }
        button:hover{
            background: ver(--th-theme-secondary-bg-color);
        }
        #form{
            display: none;
            text-align: center;
        }

        input{
            width: 90%;
            outline: none;
            margin: 10px 5%;
            padding: 15px 10px;
            font-size: 14px;
            border: 2px solid silver;
            border-radius: 5px;
        }
        input:focus{
            border-color: #db5d5d;
        }

    </style>
</head>
<body>
 <div id="menu">
     <h1>Онлайн магазин</h1>
     <img src="1.png.png">
     <p>Набор настольной игры "Грань"</p>
     <button id="buy">Купить</button>
 </div>
 <form id="form">
         <p>Заполните форму, чтобы менеджер мог подтвердить заказ</p>
         <input type="text" placeholder="Имя" id="user_name" name="name">
         <input type="number" placeholder="Номер" id="user_number" name="phone">
         <input type="email" placeholder="Почта" id="user_email" name="email">
	 <button type='submit' id="order">Оформить</button>
         


 </form>
<script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script>
        const TOKEN ="6662719288:AAHrU_JHU3WF2CqWggsAtVHjaJ10AHr2KFc";
        const CHAT_ID ="-1002094160959";
        const URI_API =`https://api.telegram.org/bot${ TOKEN }/sendMessage`;

        document.getElementById("form").addEventListener("submit",function(e) {
          e.preventDefault();

          let message = `<b>Заказ из бота</b>\n`
          message += `<b>Отправитель: </b> ${ this.name.value }\n`;
          message += `<b>Номер телефона: </b> ${ this.phone.value }\n`;
          message += `<b>Почта: </b> ${ this.email.value }`;

          axios.post(URI_API,{
            chat_id: CHAT_ID,
            parse_mode: 'html',
            text: message
          })
        })
     </script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
	<script>
		let tg = window.Telegram.WebApp;
		let buy = document.getElementById("buy");
		let order = document.getElementById("order");
		

		buy.addEventListener("click", () => {
            document.getElementById("menu").style.display = "none";
            document.getElementById("form").style.display = "block";
		})

		order.addEventListener("click",() => {
            tg.close();
		});
	</script>
</body>
</html>
